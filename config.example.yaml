# ============================================================
# 小红书/抖音发布助手 — 账号配置文件
# 
# 📝 首次使用？两种方式：
#   1. 直接编辑此文件，参考下方注释填写
#   2. 在 Kiro 中输入 "帮我配置账号" 或 "setup my account"，
#      agent 会通过对话引导你完成配置
#
# 💡 所有字段都有默认值，你只需要改你关心的部分
# ============================================================

# --- 账号基本信息 ---
account:
  name: ""                    # 你的账号名称，如 "信号塔Tech"、"小美食记"
  bio: ""                     # 一句话简介，如 "每天分享AI前沿资讯"
  avatar: ""                  # 头像路径（可选），如 "social/avatar.png"

# --- 内容领域 ---
# 定义你的账号聚焦什么内容
niche:
  primary: ""                 # 主领域，如 "AI科技"、"美食探店"、"穿搭"、"旅行"、"健身"
  topics:                     # 具体话题（3-5个）
    - ""                      # 如 "大模型"、"火锅"、"日系穿搭"
    - ""
    - ""
  audience: ""                # 目标受众，如 "对AI感兴趣的年轻人"、"25-35岁都市女性"

# --- 写作风格 ---
style:
  tone: "casual"              # casual（口语化）| professional（专业）| playful（活泼）| minimal（极简）
  language: "zh"              # zh（中文）| en（英文）| mixed（中英混合）
  perspective: ""             # 你的独特视角，如 "硅谷视角中文解读"、"本地人带你吃"
  
  # 禁止出现的内容（可选）
  avoid:
    - "贩卖焦虑"
    - "标题党无实质内容"

# --- 标签策略 ---
tags:
  # 每次发帖固定带的标签（1-2个）
  always:
    - ""                      # 如 "AI"、"美食"、"穿搭分享"
  # 常用标签池，agent 会从中选择（5-10个）
  pool:
    - ""                      # 如 "人工智能"、"探店"、"OOTD"
    - ""
    - ""

# --- 发布偏好 ---
publishing:
  # 首选发布时段（北京时间）
  # 可选: morning(08:00) | lunch(12:00) | evening(20:00) | night(21:30)
  preferred_slots:
    - "evening"
    - "lunch"
  
  # 是否声明原创
  is_original: true
  
  # 封面风格偏好
  cover_style: ""             # 如 "深色背景大字"、"清新ins风"、"实拍为主"
